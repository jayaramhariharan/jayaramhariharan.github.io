<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Harborline boarding flow placeholder</title>
  <desc id="desc">A simple boarding flow diagram placeholder used to satisfy legacy asset references during development.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="110" y="120" font-size="32" font-weight="700" fill="#0f172a">Harborline Boarding Flow</text>
    <text x="110" y="165" font-size="20" fill="#334155">Placeholder diagram restored to resolve missing Vite asset references.</text>

    <rect x="110" y="270" width="240" height="120" rx="28" fill="#ffffff" stroke="#93c5fd" stroke-width="4" />
    <text x="230" y="330" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Search</text>
    <text x="230" y="362" text-anchor="middle" font-size="16" fill="#475569">Find route or ticket</text>

    <rect x="470" y="270" width="240" height="120" rx="28" fill="#ffffff" stroke="#93c5fd" stroke-width="4" />
    <text x="590" y="330" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Select</text>
    <text x="590" y="362" text-anchor="middle" font-size="16" fill="#475569">Choose trip details</text>

    <rect x="830" y="270" width="240" height="120" rx="28" fill="#ffffff" stroke="#93c5fd" stroke-width="4" />
    <text x="950" y="330" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Pay</text>
    <text x="950" y="362" text-anchor="middle" font-size="16" fill="#475569">Confirm booking</text>

    <rect x="1190" y="270" width="240" height="120" rx="28" fill="#ffffff" stroke="#93c5fd" stroke-width="4" />
    <text x="1310" y="330" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Board</text>
    <text x="1310" y="362" text-anchor="middle" font-size="16" fill="#475569">Scan and embark</text>

    <path d="M350 330 H470" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" />
    <path d="M710 330 H830" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" />
    <path d="M1070 330 H1190" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" />

    <polygon points="455,330 425,312 425,348" fill="#2563eb" />
    <polygon points="815,330 785,312 785,348" fill="#2563eb" />
    <polygon points="1175,330 1145,312 1145,348" fill="#2563eb" />

    <rect x="110" y="520" width="1320" height="180" rx="36" fill="#0f172a" opacity="0.06" />
    <text x="150" y="585" font-size="22" font-weight="700" fill="#0f172a">Why this file exists</text>
    <text x="150" y="630" font-size="18" fill="#334155">
      A stylesheet or generated class still requests this SVG path. Keeping the asset in place prevents Vite from failing while the stale reference is tracked down.
    </text>
  </g>
</svg>
